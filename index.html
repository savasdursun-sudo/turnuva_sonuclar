<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bilardo Turnuva Yayın Merkezi</title>
  <style>
    body{margin:0;background:#0b1420;color:#e8eef7;font-family:system-ui,-apple-system,Segoe UI,sans-serif}
    main{max-width:960px;margin:0 auto;padding:28px 16px 48px}
    .card{background:#152235;border:1px solid #294055;border-radius:18px;padding:20px;box-shadow:0 18px 45px rgba(0,0,0,.25)}
    a{color:#7dd3fc}.item{border:1px solid #294055;background:#0f1b2a;border-radius:12px;padding:14px;margin:10px 0}
    .muted{color:#9fb4ca}button{border:0;border-radius:10px;background:#1b8f6a;color:white;font-weight:800;padding:10px 14px;cursor:pointer}
  </style>
</head>
<body>
<main>
  <section class="card">
    <h1>Bilardo Turnuva Yayın Merkezi</h1>
    <p class="muted">Yayınlanan turnuvalar bu merkezden listelenir. Bu proje tek salon içindir; her turnuva kendi ayrı linkinde tutulur.</p>
    <div id="liste" class="muted">Yayın listesi yükleniyor...</div>
  </section>
</main>
<script>
fetch('yayinlar.json?v=' + Date.now(), {cache:'no-store'})
  .then(r => r.ok ? r.json() : Promise.reject())
  .then(data => {
    const list = Array.isArray(data.yayinlar) ? data.yayinlar : [];
    document.getElementById('liste').innerHTML = list.length ? list.map(x => `
      <div class="item">
        <h2>${escapeHtml(x.turnuva_adi || 'Turnuva')}</h2>
        <div class="muted">${escapeHtml(x.salon_adi || '')} • Durum: ${escapeHtml(x.yayin_durumu || 'yayinda')} • Son güncelleme: ${escapeHtml(x.son_guncelleme || '—')}</div>
        <p><a href="${escapeAttr(x.relative_path || '')}/">Turnuva sayfasını aç</a></p>
      </div>`).join('') : 'Henüz yayınlanmış turnuva yok.';
  })
  .catch(() => { document.getElementById('liste').textContent = 'Yayın listesi okunamadı.'; });
function escapeHtml(v){return String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;')}
function escapeAttr(v){return escapeHtml(v).replaceAll('`','')}
</script>
</body>
</html>
